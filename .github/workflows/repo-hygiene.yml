name: repo-hygiene

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  repo-hygiene:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Repo hygiene unit tests
        run: |
          python -m unittest discover -s scripts/tests -p 'test_repo_hygiene_audit.py'
          python -m unittest discover -s scripts/tests -p 'test_control_plane_sync_audit.py'
          python -m unittest discover -s scripts/tests -p 'test_start_effort.py'
          python -m unittest discover -s scripts/tests -p 'test_worktree_effort.py'

      - name: Root hygiene hard-fail audit
        run: python scripts/repo_hygiene_audit.py --scope root --strict --json > /tmp/repo_hygiene_root.json

      - name: Journal hygiene advisory audit
        run: python scripts/repo_hygiene_audit.py --scope journal --json > /tmp/repo_hygiene_journal.json

      - name: Archive hygiene advisory audit
        run: python scripts/repo_hygiene_audit.py --scope archive --json > /tmp/repo_hygiene_archive.json

      - name: Control-plane sync advisory audit
        run: python scripts/control_plane_sync_audit.py --json > /tmp/control_plane_sync.json

      - name: Internal markdown link audit
        run: python scripts/docs_link_audit.py
