search_tools:
  - search_tool_name: searxng-search
    litellm_params:
      search_provider: searxng
      api_base: os.environ/SEARXNG_API_BASE
      api_key: os.environ/SEARXNG_API_KEY
      timeout: 10
    search_tool_info:
      description: "Local SearXNG search (JSON)."

router_settings:
  allowed_fails: 2
  cooldown_time: 15
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1

litellm_settings:
  json_logs: true
  drop_params: true
  callbacks:
    - prompt_injector.prompt_injector_instance
