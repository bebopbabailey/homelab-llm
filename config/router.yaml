search_tools:
- search_tool_name: searxng-search
  litellm_params:
    search_provider: searxng
    api_base: os.environ/SEARXNG_API_BASE
    api_key: os.environ/SEARXNG_API_KEY
    timeout: 10
  search_tool_info:
    description: Local SearXNG search (JSON).
router_settings:
  allowed_fails: 2
  cooldown_time: 15
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1
litellm_settings:
  json_logs: true
  drop_params: false
  callbacks:
  - prompt_injector.prompt_injector_instance
  - persona_router.persona_router_instance
guardrails:
  - guardrail_name: promptopt-max-guardrail
    litellm_params:
      guardrail: promptopt_guardrail.PromptOptMaxGuardrail
      mode: "post_call"
      default_on: false
  - guardrail_name: verb-max-guardrail
    litellm_params:
      guardrail: verb_max_guardrail.VerbMaxGuardrail
      mode: "post_call"
      default_on: false
  - guardrail_name: strip-reasoning-guardrail
    litellm_params:
      guardrail: strip_reasoning_guardrail.StripReasoningGuardrail
      mode: "post_call"
      default_on: false
  - guardrail_name: transcribe-guardrail
    litellm_params:
      guardrail: transcribe_guardrail.TranscribeGuardrail
      mode: "post_call"
      default_on: false
