model_list:
# BEGIN MLXCTL AUTO
# MLX model entries omitted (aliases-only model_list).
# Canonical model_ids remain in the MLX registry and env.local.
# END MLXCTL AUTO
# 1) Core role aliases: stable public lanes only
- model_name: main
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_BASE
    api_key: dummy
    max_tokens: 16384
- model_name: deep
  litellm_params:
    model: os.environ/LLMSTER_DEEP_MODEL
    api_base: os.environ/LLMSTER_DEEP_API_BASE
    api_key: dummy
    max_tokens: 16384
- model_name: fast
  litellm_params:
    model: os.environ/LLMSTER_FAST_MODEL
    api_base: os.environ/LLMSTER_FAST_API_BASE
    api_key: dummy
    max_tokens: 16384
search_tools:
- search_tool_name: searxng-search
  litellm_params:
    search_provider: searxng
    api_base: os.environ/SEARXNG_API_BASE
    api_key: os.environ/SEARXNG_API_KEY
    timeout: 10
  search_tool_info:
    description: Local SearXNG search (JSON).
router_settings:
  allowed_fails: 2
  cooldown_time: 15
  fallbacks:
    - {"fast": ["main"]}
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1
litellm_settings:
  json_logs: false
  drop_params: true
  modify_params: true
  set_verbose: true
  callbacks: ["prometheus"]
guardrails:
  - guardrail_name: "prompt-pre"
    litellm_params:
      guardrail: "prompt_guardrail.PromptGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "harmony-pre"
    litellm_params:
      guardrail: "harmony_guardrail.HarmonyGuardrail"
      mode: "pre_call"
      default_on: true
      target_models: "deep,fast"
      coerce_stream_false: false
  - guardrail_name: "harmony-post"
    litellm_params:
      guardrail: "harmony_guardrail.HarmonyGuardrail"
      mode: "post_call"
      default_on: true
      target_models: "deep,fast"
      coerce_stream_false: false
  - guardrail_name: "transcribe-pre"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "transcribe-post"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "post_call"
      default_on: true
  - guardrail_name: "qwen-toolcall-post"
    litellm_params:
      guardrail: "qwen_toolcall_posthook.QwenToolcallPostHook"
      mode: "post_call"
      default_on: true
