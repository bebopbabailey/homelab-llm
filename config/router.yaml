model_list:
# 1) Core role aliases: main / deep / fast / swap
- model_name: main
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_BASE
    api_key: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_KEY
    max_tokens: 2048
- model_name: deep
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_API_KEY
    max_tokens: 2048
- model_name: fast
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_KEY
    max_tokens: 2048
- model_name: swap
  litellm_params:
    # swap placeholder: points at fast until a dedicated swap endpoint is added
    model: os.environ/SWAP_MODEL
    api_base: os.environ/SWAP_API_BASE
    api_key: os.environ/SWAP_API_KEY

# 2) OptiLLM boost lane (opt-in)
- model_name: boost
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
- model_name: boost-deep
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_MODEL
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY

# 3) Experimental aliases: x1..x4
- model_name: x1
  litellm_params:
    # x1 placeholder: swap
    model: os.environ/SWAP_MODEL
    api_base: os.environ/SWAP_API_BASE
    api_key: os.environ/SWAP_API_KEY
- model_name: x2
  litellm_params:
    # x2 placeholder: swap
    model: os.environ/SWAP_MODEL
    api_base: os.environ/SWAP_API_BASE
    api_key: os.environ/SWAP_API_KEY
- model_name: x3
  litellm_params:
    # x3 placeholder: swap
    model: os.environ/SWAP_MODEL
    api_base: os.environ/SWAP_API_BASE
    api_key: os.environ/SWAP_API_KEY
- model_name: x4
  litellm_params:
    # x4 placeholder: swap
    model: os.environ/SWAP_MODEL
    api_base: os.environ/SWAP_API_BASE
    api_key: os.environ/SWAP_API_KEY

# 4) Task aliases (optional): task-transcribe, task-transcribe-vivid
- model_name: task-transcribe
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_KEY
    max_tokens: 2048
- model_name: task-transcribe-vivid
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_KEY
    max_tokens: 2048

search_tools:
- search_tool_name: searxng-search
  litellm_params:
    search_provider: searxng
    api_base: os.environ/SEARXNG_API_BASE
    api_key: os.environ/SEARXNG_API_KEY
    timeout: 10
  search_tool_info:
    description: Local SearXNG search (JSON).
router_settings:
  allowed_fails: 2
  cooldown_time: 15
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1
litellm_settings:
  json_logs: true
  drop_params: false
