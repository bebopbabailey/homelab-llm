model_list:
# BEGIN MLXCTL AUTO
# MLX model entries omitted (aliases-only model_list).
# Canonical model_ids remain in the MLX registry and env.local.
# END MLXCTL AUTO
# 1) Core role aliases: main / deep / fast (+ temporary metal-test aliases)
- model_name: main
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_BASE
    api_key: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_KEY
    max_tokens: 16384
- model_name: deep
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_120B_MXFP4_Q4_API_KEY
    max_tokens: 16384
- model_name: fast
  litellm_params:
    model: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_MODEL
    api_base: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_BASE
    api_key: os.environ/MLX_MLX_GPT_OSS_20B_MXFP4_Q4_API_KEY
    max_tokens: 16384
- model_name: metal-test-fast
  litellm_params:
    # temporary experimental vllm-metal canaries on Studio 8120-8139
    model: os.environ/METAL_TEST_FAST_MODEL
    api_base: os.environ/METAL_TEST_FAST_API_BASE
    api_key: os.environ/METAL_TEST_FAST_API_KEY
    max_tokens: 16384
- model_name: metal-test-main
  litellm_params:
    model: os.environ/METAL_TEST_MAIN_MODEL
    api_base: os.environ/METAL_TEST_MAIN_API_BASE
    api_key: os.environ/METAL_TEST_MAIN_API_KEY
    max_tokens: 16384
- model_name: metal-test-deep
  litellm_params:
    model: os.environ/METAL_TEST_DEEP_MODEL
    api_base: os.environ/METAL_TEST_DEEP_API_BASE
    api_key: os.environ/METAL_TEST_DEEP_API_KEY
    max_tokens: 16384

# 2) OptiLLM boost lane (opt-in)
- model_name: boost
  litellm_params:
    model: openai/main
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

- model_name: boost-deep
  litellm_params:
    model: openai/deep
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

# 2b) OptiLLM coding-quality profiles (deterministic aliases)
- model_name: boost-plan
  litellm_params:
    # plansearch + deep lane for high-quality coding plans
    model: plansearch-openai/deep
    custom_llm_provider: openai
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

- model_name: boost-plan-trio
  litellm_params:
    # canary trio planner plugin (fast/main/deep staged orchestration)
    model: plansearchtrio-openai/deep
    custom_llm_provider: openai
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

- model_name: boost-plan-verify
  litellm_params:
    # self-consistency pass to verify/pressure-test plans
    model: self_consistency-openai/deep
    custom_llm_provider: openai
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

- model_name: boost-ideate
  litellm_params:
    # moa for divergent architecture exploration
    model: moa-openai/deep
    custom_llm_provider: openai
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 16384

- model_name: boost-fastdraft
  litellm_params:
    # best-of-n for lower-cost drafting passes
    model: bon-openai/fast
    custom_llm_provider: openai
    api_base: os.environ/OPTILLM_API_BASE
    api_key: os.environ/OPTILLM_API_KEY
    max_tokens: 8192

# 3) Task aliases: task-transcribe, task-transcribe-vivid
- model_name: task-transcribe
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_BASE
    api_key: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_KEY
    temperature: 0.05
    top_p: 1.0
    max_tokens: 4096
    presence_penalty: 0.0
    frequency_penalty: 0.0

- model_name: task-transcribe-vivid
  litellm_params:
    model: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_MODEL
    api_base: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_BASE
    api_key: os.environ/MLX_MLX_QWEN3_NEXT_80B_MXFP4_A3B_INSTRUCT_API_KEY
    temperature: 0.4
    top_p: 1.0
    max_tokens: 4096
    presence_penalty: 0.0
    frequency_penalty: 0.2


search_tools:
- search_tool_name: searxng-search
  litellm_params:
    search_provider: searxng
    api_base: os.environ/SEARXNG_API_BASE
    api_key: os.environ/SEARXNG_API_KEY
    timeout: 10
  search_tool_info:
    description: Local SearXNG search (JSON).
router_settings:
  allowed_fails: 2
  cooldown_time: 15
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1
litellm_settings:
  json_logs: false
  drop_params: false
  modify_params: true
  set_verbose: true
  callbacks: ["prometheus"]
guardrails:
  - guardrail_name: "prompt-pre"
    litellm_params:
      guardrail: "prompt_guardrail.PromptGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "harmony-pre"
    litellm_params:
      guardrail: "harmony_guardrail.HarmonyGuardrail"
      mode: "pre_call"
      default_on: true
      target_models: "deep,fast,boost,boost-deep,boost-plan,boost-plan-trio,boost-plan-verify,boost-ideate,boost-fastdraft"
      coerce_stream_false: false
  - guardrail_name: "harmony-post"
    litellm_params:
      guardrail: "harmony_guardrail.HarmonyGuardrail"
      mode: "post_call"
      default_on: true
      target_models: "deep,fast,boost,boost-deep,boost-plan,boost-plan-trio,boost-plan-verify,boost-ideate,boost-fastdraft"
      coerce_stream_false: false
  - guardrail_name: "transcribe-pre"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "transcribe-post"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "post_call"
      default_on: true
