# BEGIN repo-managed Mini Finder SMB block
[global]
   interfaces = 127.0.0.1 192.168.1.71
   bind interfaces only = yes
   map to guest = never
   server min protocol = SMB2_02
   usershare allow guests = no

[mini-root]
   path = /
   browseable = yes
   guest ok = no
   valid users = christopherbailey
   force user = christopherbailey
   read only = no
   hide unreadable = yes
   hide files = /proc/ /sys/ /dev/ /run/
   create mask = 0644
   directory mask = 0755

[seagate]
   path = /mnt/seagate
   browseable = yes
   guest ok = no
   valid users = christopherbailey
   force user = christopherbailey
   read only = no
   create mask = 0664
   directory mask = 0775
# END repo-managed Mini Finder SMB block
