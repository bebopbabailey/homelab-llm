model_list:
# BEGIN MLXCTL AUTO
# MLX model entries omitted (aliases-only model_list).
# Canonical model_ids remain in the MLX registry and env.local.
# END MLXCTL AUTO
# 1) Core role aliases: stable public lanes only
- model_name: deep
  litellm_params:
    model: os.environ/LLMSTER_DEEP_MODEL
    api_base: os.environ/LLMSTER_DEEP_API_BASE
    api_key: dummy
    max_tokens: 16384
- model_name: code-reasoning
  litellm_params:
    model: os.environ/LLMSTER_DEEP_MODEL
    api_base: os.environ/LLMSTER_DEEP_API_BASE
    api_key: dummy
    max_tokens: 16384
  model_info:
    mode: chat
    max_input_tokens: 32768
    max_output_tokens: 16384
    supports_function_calling: true
    supports_system_messages: true
- model_name: fast
  litellm_params:
    model: os.environ/LLMSTER_FAST_MODEL
    api_base: os.environ/LLMSTER_FAST_API_BASE
    api_key: dummy
    max_tokens: 16384
- model_name: chatgpt-5
  litellm_params:
    model: openai/gpt-5.3-codex
    api_base: os.environ/CCPROXY_ADAPTER_API_BASE
    api_key: dummy
    max_tokens: 16384
  model_info:
    mode: chat
    max_output_tokens: 16384
    supports_function_calling: true
    supports_system_messages: true
# 2) Task completion aliases below
- model_name: task-transcribe
  litellm_params:
    model: os.environ/LLMSTER_FAST_MODEL
    api_base: os.environ/LLMSTER_FAST_API_BASE
    api_key: dummy
    max_tokens: 4096
  model_info:
    mode: chat
    max_output_tokens: 4096
    supports_function_calling: false
    supports_system_messages: true

- model_name: task-transcribe-vivid
  litellm_params:
    model: os.environ/LLMSTER_FAST_MODEL
    api_base: os.environ/LLMSTER_FAST_API_BASE
    api_key: dummy
    max_tokens: 4096
  model_info:
    mode: chat
    max_output_tokens: 4096
    supports_function_calling: false
    supports_system_messages: true

- model_name: task-json
  litellm_params:
    model: os.environ/LLMSTER_FAST_MODEL
    api_base: os.environ/LLMSTER_FAST_API_BASE
    api_key: dummy
    max_tokens: 1024
  model_info:
    mode: chat
    max_output_tokens: 1024
    supports_function_calling: false
    supports_system_messages: true
search_tools:
- search_tool_name: searxng-search
  litellm_params:
    search_provider: searxng
    api_base: os.environ/SEARXNG_API_BASE
    api_key: os.environ/SEARXNG_API_KEY
    timeout: 10
  search_tool_info:
    description: Local SearXNG search (JSON).
router_settings:
  allowed_fails: 2
  cooldown_time: 15
  fallbacks:
    - {"fast": ["deep"]}
  retry_policy:
    Timeout: 1
    APIConnectionError: 1
    RateLimitError: 0
    ServiceUnavailableError: 1
litellm_settings:
  json_logs: false
  drop_params: true
  modify_params: true
  set_verbose: true
  callbacks: ["prometheus"]
guardrails:
  - guardrail_name: "prompt-pre"
    litellm_params:
      guardrail: "prompt_guardrail.PromptGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "llmster-toolcall-pre"
    litellm_params:
      guardrail: "llmster_toolcall_guardrail.LlmsterToolcallGuardrail"
      mode: "pre_call"
      default_on: true
      target_models: "deep,fast,code-reasoning"
  - guardrail_name: "gpt-request-defaults"
    litellm_params:
      guardrail: "gpt_request_defaults.GPTRequestDefaults"
      mode: "pre_call"
      default_on: true
      target_models: "deep,fast,code-reasoning"
  - guardrail_name: "llmster-toolcall-post"
    litellm_params:
      guardrail: "llmster_toolcall_guardrail.LlmsterToolcallGuardrail"
      mode: "post_call"
      default_on: true
      target_models: "deep,fast,code-reasoning"
  - guardrail_name: "transcribe-pre"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "transcribe-post"
    litellm_params:
      guardrail: "transcribe_guardrail.TranscribeGuardrail"
      mode: "post_call"
      default_on: true
  - guardrail_name: "task-json-pre"
    litellm_params:
      guardrail: "task_json_guardrail.TaskJsonGuardrail"
      mode: "pre_call"
      default_on: true
  - guardrail_name: "task-json-post"
    litellm_params:
      guardrail: "task_json_guardrail.TaskJsonGuardrail"
      mode: "post_call"
      default_on: true
