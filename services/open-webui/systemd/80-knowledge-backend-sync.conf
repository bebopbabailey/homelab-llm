[Service]
Environment="VECTOR_DB=elasticsearch"
Environment="ELASTICSEARCH_URL=http://127.0.0.1:19200"
Environment="ELASTICSEARCH_INDEX_PREFIX=open_webui_collections"
Environment="RAG_EMBEDDING_ENGINE=openai"
Environment="RAG_OPENAI_API_BASE_URL=http://192.168.1.72:55440/v1"
Environment="RAG_OPENAI_API_KEY=dummy"
Environment="RAG_EMBEDDING_MODEL=studio-nomic-embed-text-v1.5"
